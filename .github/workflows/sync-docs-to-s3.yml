name: Sync Docs to S3

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'knowledgebase/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Sync to raw S3 bucket
        run: |
          aws s3 sync knowledgebase/ s3://${{ secrets.S3_RAW_BUCKET }}/knowledgebase/ \
            --delete \
            --no-progress

      - name: Sync markdown to vector S3 bucket
        run: |
          aws s3 sync knowledgebase/ s3://${{ secrets.S3_VECTOR_BUCKET }}/knowledgebase/ \
            --delete \
            --exclude "*" \
            --include "*.md" \
            --no-progress
